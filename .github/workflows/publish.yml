name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Test, Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Verify version matches tag
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        # Production build: minified bundle (~33% smaller) for npm distribution (PERF-11)
        run: bun run build:prod

      - name: Verify NPM_TOKEN is configured
        shell: bash
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "ERROR: NPM_TOKEN secret is not configured in this repository"
            exit 1
          fi
          # NOTE (SEC-16): NPM_TOKEN is a static secret stored in GitHub repository secrets.
          # For improved security in v2, consider migrating to OIDC Trusted Publishing:
          # https://docs.npmjs.com/generating-provenance-statements
          # OIDC eliminates the need for long-lived static tokens by using OpenID Connect
          # to verify the workflow identity directly with npm. This requires:
          #   1. Enabling "Require two-factor authentication" on the npm package
          #   2. Adding `provenance: true` to npm publish
          #   3. Granting `id-token: write` permission (already present in this workflow)
          # Until then, ensure NPM_TOKEN has minimal permissions (publish only, not read:packages).
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
